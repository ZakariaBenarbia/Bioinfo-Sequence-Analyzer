<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sequence Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: #f5f4f0;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        header { text-align: center; margin-bottom: 2.5rem; }

        header h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -.02em;
            margin-bottom: .4rem;
        }

        header p { font-size: .9rem; color: #777; font-weight: 300; }

        .card {
            background: #fff;
            border: 1px solid #e0ddd6;
            border-radius: 12px;
            padding: 2.25rem;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 4px 24px rgba(0,0,0,.06);
        }

        label {
            display: block;
            font-size: .72rem;
            font-weight: 500;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: .5rem;
        }

        textarea, select {
            width: 100%;
            border: 1px solid #e0ddd6;
            border-radius: 7px;
            padding: .8rem 1rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: .82rem;
            color: #1a1a1a;
            background: #faf9f7;
            outline: none;
            transition: border-color .2s;
        }
        textarea { resize: vertical; }
        textarea::placeholder { color: #bbb; }
        textarea:focus, select:focus { border-color: #1a1a1a; background: #fff; }

        .field + .field { margin-top: 1.25rem; }

        button[type="submit"] {
            display: block;
            width: 100%;
            background: #1a1a1a;
            color: #fff;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: .9rem;
            font-weight: 500;
            border: none;
            border-radius: 7px;
            padding: .8rem;
            cursor: pointer;
            margin-top: 1.75rem;
            transition: background .2s;
        }
        button[type="submit"]:hover { background: #333; }

        .hint { font-size: .73rem; color: #aaa; margin-top: .4rem; }

        .error {
            background: #fff5f5;
            border: 1px solid #ffd0d0;
            border-radius: 7px;
            color: #c0392b;
            font-size: .84rem;
            padding: .75rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .error button {
            background: none; border: none;
            color: #c0392b; cursor: pointer; font-size: 1rem;
        }

        footer { margin-top: 2rem; font-size: .73rem; color: #bbb; font-family: 'IBM Plex Mono', monospace; }
    </style>
</head>
<body>

    <header>
        <h1>Sequence Analyzer</h1>
        <p>DNA &amp; RNA nucleotide analysis</p>
    </header>

    <div class="card">
        {% if error %}
        <div class="error">
            <span>⚠ {{ error }}</span>
            <button onclick="this.parentElement.remove()">✕</button>
        </div>
        {% endif %}

        <form method="post" action="{% url 'analyzer:web_analyze' %}">
            {% csrf_token %}

            <div class="field">
                <label for="sequence">Sequence</label>
                <textarea id="sequence" name="sequence" rows="8"
                    placeholder="Paste ATGC / AUGC sequence here…">{{ sequence|default:'' }}</textarea>
                <p class="hint">Remove headers and non-nucleotide characters before analysis.</p>
            </div>

            <div class="field">
                <label for="type">Molecule type</label>
                <select id="type" name="type">
                    <option value="DNA" {% if type == 'DNA' %}selected{% endif %}>DNA — Deoxyribonucleic acid</option>
                    <option value="RNA" {% if type == 'RNA' %}selected{% endif %}>RNA — Ribonucleic acid</option>
                </select>
            </div>

            <button type="submit">Analyze →</button>
        </form>
    </div>

    <footer>bioanalyst · sequences processed locally</footer>

</body>
</html>
